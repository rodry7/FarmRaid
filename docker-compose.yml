services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: exploitfarm
      POSTGRES_USER: farm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farm -d exploitfarm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://farm:${POSTGRES_PASSWORD:-farmpass}@postgres/exploitfarm
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      UPLOADS_DIR: /app/uploads
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "4755:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
